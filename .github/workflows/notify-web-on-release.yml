name: Notify Web on Release

on:
  release:
    types: [published]

jobs:
  notify-web:
    name: Trigger novelnest-web deployment
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch to novelnest-web
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEB_REPO_PAT }}
          repository: YOUR_USERNAME/novelnest-web   # ← update this
          event-type: new-release
          client-payload: |
            {
              "version": "${{ github.event.release.tag_name }}",
              "release_url": "${{ github.event.release.html_url }}",
              "apk_url": "${{ github.event.release.assets[0].browser_download_url }}"
            }
