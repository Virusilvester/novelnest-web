name: Deploy GitHub Pages

on:
  # Triggered by a release event from the main NovelNest repo
  repository_dispatch:
    types: [new-release]

  # Also deploy on any push to main (e.g. design updates)
  push:
    branches:
      - main

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout novelnest-web
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Uploads the whole repo root (where index.html lives)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
